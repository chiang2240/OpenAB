version: "3.8"

# рҹҸ”пёҸ еҚ—ж–№е…¬ең’й–ӢзҷјеңҳйҡҠ
# е•ҹеӢ•: docker compose up -d --build
# еҒңжӯў: docker compose down
# зңӢ logs: docker compose logs -f cartman
# жӣҙж–° OpenAB: docker compose build --pull && docker compose up -d

services:
  cartman:
    build: .
    container_name: cartman
    restart: unless-stopped
    command: sh -c "mkdir -p /home/agent/projects && openab run"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_CARTMAN}
      - CHANNEL_GENERAL=${CHANNEL_GENERAL}
      - GIT_AUTHOR_NAME=еҚЎзү№жӣј (Cartman)
      - GIT_COMMITTER_NAME=еҚЎзү№жӣј (Cartman)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/cartman/config.toml:/etc/openab/config.toml:ro
      - ./agents/cartman:/home/agent

  stan:
    build: .
    container_name: stan
    restart: unless-stopped
    command: sh -c "mkdir -p /home/agent/projects && openab run"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_STAN}
      - CHANNEL_GENERAL=${CHANNEL_GENERAL}
      - GIT_AUTHOR_NAME=ж–ҜеқҰ (Stan)
      - GIT_COMMITTER_NAME=ж–ҜеқҰ (Stan)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/stan/config.toml:/etc/openab/config.toml:ro
      - ./agents/stan:/home/agent

  kyle:
    build: .
    container_name: kyle
    restart: unless-stopped
    command: sh -c "mkdir -p /home/agent/projects && openab run"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_KYLE}
      - CHANNEL_GENERAL=${CHANNEL_GENERAL}
      - GIT_AUTHOR_NAME=еҮұзҲҫ (Kyle)
      - GIT_COMMITTER_NAME=еҮұзҲҫ (Kyle)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/kyle/config.toml:/etc/openab/config.toml:ro
      - ./agents/kyle:/home/agent

  kenny:
    build: .
    container_name: kenny
    restart: unless-stopped
    command: sh -c "mkdir -p /home/agent/projects && openab run"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_KENNY}
      - CHANNEL_GENERAL=${CHANNEL_GENERAL}
      - GIT_AUTHOR_NAME=иӮҜе°ј (Kenny)
      - GIT_COMMITTER_NAME=иӮҜе°ј (Kenny)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/kenny/config.toml:/etc/openab/config.toml:ro
      - ./agents/kenny:/home/agent
