[discord]
bot_token = "${DISCORD_BOT_TOKEN}"
allowed_channels = ["${CHANNEL_GENERAL}"]

[agent]
command = "claude"
args = ["--dangerously-skip-permissions"]
working_dir = "/home/agent/projects"

[pool]
max_sessions = 10
session_ttl_hours = 24

[reactions]
enabled = true
remove_after_reply = false

[reactions.emojis]
queued = "👀"
thinking = "🤔"
tool = "🔥"
coding = "🎿"
web = "⚡"
done = "🆗"
error = "😱"

[reactions.timing]
debounce_ms = 700
stall_soft_ms = 10000
stall_hard_ms = 30000
done_hold_ms = 1500
error_hold_ms = 2500
